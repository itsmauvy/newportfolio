<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — 장수빈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0a0a0b;
      color: #fff;
      font-family: "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }

    /* ── 헤더 (index.html과 동일: mix-blend + 글자 롤업 호버, 모든 서브 페이지 공통) ── */
    #site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 2.4vh 4vw;
      pointer-events: none;
      mix-blend-mode: difference;
    }
    #site-header .nav {
      display: flex;
      gap: clamp(1.4rem, 2.5vw, 3rem);
      pointer-events: auto;
    }
    #site-header .nav a {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      display: inline-block;
      overflow: hidden;
      height: 1.4em;
      opacity: 0.6;
      transition: opacity 0.3s;
    }
    #site-header .nav a:hover { opacity: 1; }
    #site-header .nav .nav-link-inner {
      position: relative;
      display: inline-block;
    }
    #site-header .nav .nav-link-inner span {
      display: block;
      line-height: 1.4em;
      transition: transform 0.3s cubic-bezier(0.76, 0, 0.24, 1);
    }
    #site-header .nav .nav-link-inner span:first-child { transform: translateY(0%); }
    #site-header .nav .nav-link-inner span:last-child {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      transform: translateY(100%);
    }
    #site-header .nav a:hover .nav-link-inner span:first-child { transform: translateY(-100%); }
    #site-header .nav a:hover .nav-link-inner span:last-child { transform: translateY(0%); }

    /* ── CONTACT (mescubook 감성 디지털 명함 + flip) ── */
    #contact {
      position: relative;
      min-height: 100vh;
      padding: 14vh 6vw 16vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6vh; overflow: hidden;
    }
    #contact .ct-eyebrow {
      font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45); text-align: center;
    }
    #contact .ct-cta {
      font-size: clamp(2rem, 6.5vw, 5.2rem); font-weight: 500;
      letter-spacing: -0.02em; line-height: 1.04; text-align: center; max-width: 14ch;
    }
    #contact .ct-cta em { font-style: normal; color: rgba(255, 255, 255, 0.38); }

    /* 명함 카드 (클릭하면 뒤집힘) */
    #contact .ct-card {
      width: min(720px, 92vw); aspect-ratio: 1.75 / 1;
      perspective: 2000px; cursor: pointer; outline: none;
    }
    #contact .ct-tilt {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
    }
    #contact .ct-card-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(0.65, 0, 0.35, 1);
    }
    #contact .ct-card.is-flipped .ct-card-inner { transform: rotateY(180deg); }
    #contact .ct-card:focus-visible .ct-card-inner { box-shadow: 0 0 0 2px rgba(255,255,255,0.5); border-radius: 14px; }
    #contact .ct-face {
      position: absolute; inset: 0;
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
      border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(150deg, #1b1b1f 0%, #0d0d0f 100%);
      padding: 7% 8%;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    #contact .ct-back { transform: rotateY(180deg); }
    #contact .ct-row { display: flex; justify-content: space-between; align-items: flex-start; }
    #contact .ct-mark { font-size: 2rem; font-weight: 500; letter-spacing: 0.02em; }
    #contact .ct-coord { font-size: 0.7rem; letter-spacing: 0.14em; color: rgba(255,255,255,0.4); text-align: right; font-variant-numeric: tabular-nums; }
    #contact .ct-name { font-size: clamp(1.8rem, 3.4vw, 2.6rem); font-weight: 500; letter-spacing: -0.01em; }
    #contact .ct-title { font-size: 0.82rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-top: 0.5rem; }
    #contact .ct-status { font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    #contact .ct-hint { font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    #contact .ct-label { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    #contact .ct-email { font-size: clamp(1.3rem, 2.6vw, 1.7rem); font-weight: 500; color: #fff; text-decoration: none; word-break: break-all; }
    #contact .ct-email:hover { text-decoration: underline; text-underline-offset: 4px; }
    #contact .ct-tel { font-size: 0.95rem; color: rgba(255,255,255,0.7); margin-top: 0.3rem; }
    #contact .ct-socials { display: flex; gap: 1.4rem; }
    #contact .ct-socials a {
      font-size: 0.76rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); text-decoration: none; transition: color 0.3s ease;
    }
    #contact .ct-socials a:hover { color: #fff; }
    #contact .ct-reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1); }
    #contact .ct-in { opacity: 1; transform: none; }
  </style>
</head>
<body>

<header id="site-header">
  <nav class="nav">
    <a href="index.html#projects"><span class="nav-link-inner"><span>Work</span><span aria-hidden="true">Work</span></span></a>
    <a href="index.html#about"><span class="nav-link-inner"><span>About</span><span aria-hidden="true">About</span></span></a>
    <a href="contact.html"><span class="nav-link-inner"><span>Contact</span><span aria-hidden="true">Contact</span></span></a>
  </nav>
</header>

<section id="contact">
  <div class="ct-card ct-reveal" id="ctCard" role="button" tabindex="0" aria-label="명함 뒤집기 — 연락처 보기">
    <div class="ct-tilt" id="ctTilt">
    <div class="ct-card-inner">
      <div class="ct-face ct-front">
        <div class="ct-row" style="justify-content:flex-end;">
          <span class="ct-coord">SEOUL, KR<br>37°33′N 126°58′E</span>
        </div>
        <div>
          <p class="ct-name">장수빈</p>
          <p class="ct-title">UX / UI Designer &amp; Publisher</p>
        </div>
        <div class="ct-row" style="align-items:flex-end;">
          <span class="ct-status">★ Available for work</span>
          <span class="ct-hint">Click to flip →</span>
        </div>
      </div>
      <div class="ct-face ct-back">
        <div class="ct-row">
          <span class="ct-label">Get in touch</span>
          <span class="ct-hint">← Flip back</span>
        </div>
        <div>
          <span class="ct-label">Email</span><br>
          <a class="ct-email" href="mailto:itsmauvely@gmail.com">itsmauvely@gmail.com</a>
          <p class="ct-tel">+82 10-4580-2999</p>
        </div>
        <div class="ct-socials">
          <a href="#" target="_blank" rel="noopener">Instagram</a>
          <a href="#" target="_blank" rel="noopener">LinkedIn</a>
          <a href="#" target="_blank" rel="noopener">Behance</a>
          <a href="#" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </div>
    </div>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  (function () {
    var card = document.getElementById('ctCard');
    if (card) {
      var flip = function (e) {
        if (e.target.closest('a')) return;
        card.classList.toggle('is-flipped');
      };
      card.addEventListener('click', flip);
      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(e); }
      });
    }

    /* ── GSAP 마우스 틸트 (마우스 따라 3D로 기울어짐) ── */
    var tilt = document.getElementById('ctTilt');
    if (card && tilt && window.gsap) {
      var MAX = 24;
      var qY = gsap.quickTo(tilt, 'rotationY', { duration: 0.5, ease: 'power3.out' });
      var qX = gsap.quickTo(tilt, 'rotationX', { duration: 0.5, ease: 'power3.out' });
      card.addEventListener('mousemove', function (e) {
        var r = card.getBoundingClientRect();
        var px = (e.clientX - r.left) / r.width - 0.5;
        var py = (e.clientY - r.top) / r.height - 0.5;
        qY(px * MAX);
        qX(-py * MAX);
      });
      card.addEventListener('mouseleave', function () {
        gsap.to(tilt, { rotationX: 0, rotationY: 0, duration: 0.7, ease: 'power3.out' });
      });
    }

    var reveals = document.querySelectorAll('#contact .ct-reveal');
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (en, i) {
        if (en.isIntersecting) {
          en.target.style.transitionDelay = (i * 0.1) + 's';
          en.target.classList.add('ct-in');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0, rootMargin: '0px 0px -10% 0px' });
    reveals.forEach(function (el) { io.observe(el); });
  })();
</script>

</body>
</html>
