<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수빈 포트폴리오</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #fff; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    #scroll-space { height: 300vh; }

    /* 고정 씬 */
    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #fff;
      z-index: 1;
      pointer-events: none;
    }

    /* ── 영상 (화면 중앙) ── */
    #video-wrap {
      position: absolute;
      top: 50%; left: 50%;
      translate: -50% -50%;
      width: 42vw;
      aspect-ratio: 16 / 9;
      flex-shrink: 0;
      will-change: transform;
      overflow: hidden;

      -webkit-mask-image: url('assets/img/bin v1.png');
              mask-image: url('assets/img/bin v1.png');
      -webkit-mask-size: contain;
              mask-size: contain;
      -webkit-mask-repeat: no-repeat;
              mask-repeat: no-repeat;
      -webkit-mask-position: center;
              mask-position: center;
    }

    #hero-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    #video-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #111 0%, #2a2a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.85rem;
      letter-spacing: 0.25em;
    }

    /* ── 텍스트 레이아웃 (영상 주변) ── */

    /* 좌상단 — 이름 */
    .txt-topleft {
      position: absolute;
      top: 7vh; left: 4vw;
      will-change: transform, opacity;
    }
    .txt-topleft h1 {
      font-size: clamp(2rem, 5vw, 6rem);
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 0.9;
      color: #000;
    }

    /* 우상단 — 직함 */
    .txt-topright {
      position: absolute;
      top: 7vh; right: 4vw;
      text-align: right;
      will-change: transform, opacity;
    }
    .txt-topright p {
      font-size: clamp(0.7rem, 1.1vw, 1rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      line-height: 1.8;
    }

    /* 좌하단 — 연도 */
    .txt-botleft {
      position: absolute;
      bottom: 7vh; left: 4vw;
      will-change: transform, opacity;
    }
    .txt-botleft p {
      font-size: clamp(0.7rem, 1vw, 0.9rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
    }

    /* 우하단 — 태그라인 */
    .txt-botright {
      position: absolute;
      bottom: 7vh; right: 4vw;
      text-align: right;
      will-change: transform, opacity;
    }
    .txt-botright p {
      font-size: clamp(0.7rem, 1.1vw, 1rem);
      letter-spacing: 0.05em;
      color: #555;
      line-height: 1.7;
    }

    /* 스크롤 힌트 */
    #scroll-hint {
      position: fixed;
      bottom: 3.5vh;
      left: 50%;
      translate: -50% 0;
      z-index: 10;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
      pointer-events: none;
    }

    /* 프리로더 */
    #preloader {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 3vw;
    }
    #preloader span {
      font-size: clamp(3rem, 8vw, 10rem);
      font-weight: 300;
      color: #000;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    #next-section {
      position: relative;
      z-index: 2;
      background: #fff;
      min-height: 100vh;
    }
  </style>
</head>
<body>

<div id="preloader"><span id="loader-num">0%</span></div>

<div id="scene">

  <!-- 텍스트: 좌상단 -->
  <div class="txt-topleft">
    <h1>수빈</h1>
  </div>

  <!-- 텍스트: 우상단 -->
  <div class="txt-topright">
    <p>UX / Product Designer<br>Portfolio 2025</p>
  </div>

  <!-- Layer 1: 전체화면 영상 (스크롤 후반에 페이드인) -->
  <video id="video-full" muted loop playsinline
    style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;z-index:0;">
    <source src="assets/video/13820343_3840_2160_30fps.mp4" type="video/mp4">
  </video>

  <!-- Layer 2: 彬 마스크 영상 (중앙에서 확대) -->
  <div id="video-wrap">
    <div id="video-placeholder">VIDEO</div>
    <video id="hero-video" muted loop playsinline>
      <source src="assets/video/13820343_3840_2160_30fps.mp4" type="video/mp4">
    </video>
  </div>

  <!-- 텍스트: 좌하단 -->
  <div class="txt-botleft">
    <p>Seoul, Korea</p>
  </div>

  <!-- 텍스트: 우하단 -->
  <div class="txt-botright">
    <p>문제를 디자인으로<br>해결하는 사람</p>
  </div>

</div>

<div id="scroll-hint">Scroll</div>

<div id="scroll-space"></div>
<div id="next-section"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script>
(function () {
  gsap.registerPlugin(ScrollTrigger);

  /* 영상 */
  const vid  = document.getElementById('hero-video');
  const vidF = document.getElementById('video-full');
  const ph   = document.getElementById('video-placeholder');
  [vid, vidF].forEach(v => {
    v.addEventListener('canplaythrough', () => { v.play(); }, { once: true });
    v.load();
  });
  vid.addEventListener('canplaythrough', () => { ph.style.display = 'none'; }, { once: true });

  /* ── 공통 ScrollTrigger 설정 ── */
  const ST = {
    trigger: '#scroll-space',
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1,
  };

  /* ── 1) 영상 확대 → 화면 채우기 ── */
  function getScale() {
    const wrap = document.getElementById('video-wrap');
    const sw = window.innerWidth, sh = window.innerHeight;
    return Math.max(sw / wrap.offsetWidth, sh / wrap.offsetHeight) * 1.05;
  }

  let stVideo;
  function buildVideo() {
    if (stVideo) stVideo.kill();
    gsap.set('#video-wrap', { scale: 1 });
    stVideo = gsap.to('#video-wrap', {
      scale: getScale(),
      ease: 'none',
      scrollTrigger: ST,
    });
  }
  buildVideo();
  window.addEventListener('resize', () => { ScrollTrigger.refresh(); buildVideo(); });

  /* ── 2) 텍스트 → 멀어지며 사라짐 (parallax) ── */
  // 각 텍스트를 바깥 방향으로 보내면서 opacity 0
  gsap.to('.txt-topleft', {
    x: '-8vw', y: '-6vh', scale: 0.7, opacity: 0,
    ease: 'none',
    scrollTrigger: { ...ST, end: '50% bottom' },
  });
  gsap.to('.txt-topright', {
    x: '8vw', y: '-6vh', scale: 0.7, opacity: 0,
    ease: 'none',
    scrollTrigger: { ...ST, end: '50% bottom' },
  });
  gsap.to('.txt-botleft', {
    x: '-8vw', y: '6vh', scale: 0.7, opacity: 0,
    ease: 'none',
    scrollTrigger: { ...ST, end: '50% bottom' },
  });
  gsap.to('.txt-botright', {
    x: '8vw', y: '6vh', scale: 0.7, opacity: 0,
    ease: 'none',
    scrollTrigger: { ...ST, end: '50% bottom' },
  });

  /* ── 3) 전체화면 영상 페이드인 (70% 이후) ── */
  gsap.to('#video-full', {
    opacity: 1,
    ease: 'none',
    scrollTrigger: { ...ST, start: '65% top', end: 'bottom bottom' },
  });

  /* ── 4) 스크롤 힌트 페이드 ── */
  gsap.to('#scroll-hint', {
    opacity: 0,
    scrollTrigger: { trigger: '#scroll-space', start: 'top top', end: '10% top', scrub: true },
  });

  /* ── 프리로더 ── */
  (function () {
    const el  = document.getElementById('preloader');
    const num = document.getElementById('loader-num');
    let n = 0;
    const step = () => {
      n += Math.random() * 7 + 2;
      if (n >= 100) {
        num.textContent = '100%';
        setTimeout(() => {
          el.style.transition = 'opacity 0.8s';
          el.style.opacity = '0';
          setTimeout(() => el.style.display = 'none', 800);
        }, 250);
      } else {
        num.textContent = Math.floor(n) + '%';
        requestAnimationFrame(step);
      }
    };
    step();
  })();
})();
</script>
</body>
</html>
